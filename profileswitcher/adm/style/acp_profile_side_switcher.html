<!-- INCLUDE overall_header.html -->

<h1>{L_ACP_PROFILE_SIDE_SWITCHER}</h1>

<form id="acp_profile_side_switcher" method="post" action="{U_ACTION}">
	<fieldset>
		<legend>{L_ACP_PSS_RIBBON_POSITION}</legend>
		<dl>
			<dt><label>{L_ACP_PSS_RIBBON_POSITION}{L_COLON}</label></dt>
			<dd>
				<label><input type="radio" class="radio" name="pss_ribbon_left" value="0"<!-- IF not PSS_RIBBON_LEFT --> checked="checked"<!-- ENDIF --> /> {L_ACP_PSS_RIBBON_RIGHT}</label><br />
				<label><input type="radio" class="radio" name="pss_ribbon_left" value="1"<!-- IF PSS_RIBBON_LEFT --> checked="checked"<!-- ENDIF --> /> {L_ACP_PSS_RIBBON_LEFT_OPT}</label>
			</dd>
			<dt></dt>
			<dd><p class="description">{L_ACP_PSS_RIBBON_EXPLAIN}</p></dd>
		</dl>
	</fieldset>
	<fieldset>
		<legend>{L_ACP_SUBMIT_CHANGES}</legend>
		<p class="submit-buttons">
			<input class="button1" type="submit" id="submit" name="submit" value="{L_SUBMIT}" />&nbsp;
			<input class="button2" type="reset" id="reset" name="reset" value="{L_RESET}" />
		</p>
		{S_FORM_TOKEN}
	</fieldset>
</form>

<!-- INCLUDE overall_footer.html -->
